<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Circular N°1 — Lista de Verificación</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#f0f2f5;color:#1a2e4a;min-height:100vh;font-size:14px}
:root{--az:#1a2e4a;--azm:#2d4f7a;--cel:#3b82c4;--vd:#22a06b;--rj:#d94040;--nr:#e8700a;--ac:#e8a020;--gris:#8899aa;--borde:rgba(0,0,0,0.10);--card:#ffffff;--sup:#f4f6f9;--r6:8px;--r10:12px;--sombra:0 2px 14px rgba(26,46,74,0.09)}

/* LOADING */
.loading-screen{position:fixed;inset:0;background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;gap:16px}
.loading-screen.hidden{display:none}
.spinner{width:36px;height:36px;border:3px solid #e0e8f0;border-top-color:var(--cel);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-txt{font-size:13px;color:var(--gris)}

/* LOGIN */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:linear-gradient(135deg,#eef3fa 0%,#f4f6f9 100%)}
.login-box{background:var(--card);border:1px solid var(--borde);border-radius:var(--r10);padding:38px 34px;width:100%;max-width:430px;box-shadow:var(--sombra)}
.login-logo{width:48px;height:48px;background:var(--az);border-radius:12px;display:flex;align-items:center;justify-content:center;margin:0 auto 18px;font-size:22px}
.login-box h1{font-family:'DM Serif Display',serif;font-size:20px;font-weight:400;text-align:center;margin-bottom:4px;color:var(--az)}
.login-box p{font-size:12px;color:var(--gris);text-align:center;margin-bottom:26px}
.login-tabs{display:flex;border:1px solid var(--borde);border-radius:var(--r6);overflow:hidden;margin-bottom:22px}
.login-tab{flex:1;padding:9px;font-size:12px;font-weight:500;border:none;background:transparent;cursor:pointer;color:var(--gris);transition:all .15s;font-family:'DM Sans',sans-serif}
.login-tab.on{background:var(--az);color:#fff}
.field{margin-bottom:14px}
.field label{display:block;font-size:10px;font-weight:600;color:var(--gris);margin-bottom:5px;letter-spacing:.06em;text-transform:uppercase}
.field input{width:100%;padding:10px 13px;border:1px solid var(--borde);border-radius:var(--r6);font-size:13px;font-family:'DM Sans',sans-serif;background:var(--sup);color:var(--az);outline:none;transition:border .15s}
.field input:focus{border-color:var(--cel);background:#fff}
.btn-pri{width:100%;padding:11px;background:var(--az);color:#fff;border:none;border-radius:var(--r6);font-size:13px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;transition:background .2s}
.btn-pri:hover{background:var(--azm)}
.btn-pri:disabled{opacity:.5;cursor:not-allowed}
.msg-err{background:#fff0f0;border:1px solid #fca5a5;border-radius:var(--r6);padding:9px 12px;font-size:12px;color:var(--rj);margin-bottom:14px}
.msg-ok{background:#f0fdf4;border:1px solid #86efac;border-radius:var(--r6);padding:9px 12px;font-size:12px;color:var(--vd);margin-bottom:14px}
.login-footer{font-size:11px;color:#c0c8d4;text-align:center;margin-top:18px;line-height:1.6}

/* ADMIN */
.admin-wrap{min-height:100vh;padding:24px;background:var(--sup)}
.admin-hdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:22px;flex-wrap:wrap;gap:12px}
.admin-hdr h2{font-family:'DM Serif Display',serif;font-size:20px;font-weight:400;color:var(--az)}
.admin-hdr p{font-size:12px;color:var(--gris);margin-top:3px}
.btn-row{display:flex;gap:8px;flex-wrap:wrap}
.btn-sm{padding:7px 15px;border:1px solid var(--borde);border-radius:var(--r6);font-size:12px;cursor:pointer;background:var(--card);font-family:'DM Sans',sans-serif;color:var(--az);transition:all .15s}
.btn-sm:hover{border-color:var(--cel);color:var(--cel)}
.btn-sm.danger:hover{border-color:var(--rj);color:var(--rj)}
.btn-sm.prim{background:var(--az);color:#fff;border-color:var(--az)}
.btn-sm.prim:hover{background:var(--azm)}
.keys-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:14px;margin-bottom:26px}
.key-card{background:var(--card);border:1px solid var(--borde);border-radius:var(--r10);padding:18px;box-shadow:var(--sombra)}
.key-card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:8px}
.key-badge{font-size:10px;font-weight:700;letter-spacing:.04em;padding:3px 10px;border-radius:20px;flex-shrink:0}
.key-badge.activa{background:#d1f2e4;color:#1a7a52}
.key-badge.inactiva{background:#e0e8f0;color:#6b7f8f}
.key-nombre{font-size:13px;font-weight:500;color:var(--az)}
.key-est{font-size:11px;color:var(--gris);margin-top:2px}
.key-fecha{font-size:10px;color:#b0bcc8;margin-top:2px}
.key-code{font-family:'Courier New',monospace;font-size:16px;font-weight:700;color:var(--cel);margin:8px 0 4px;letter-spacing:.06em}
.key-pct-txt{font-size:20px;font-weight:500;margin-bottom:2px}
.key-progbar{height:5px;background:#e0e8f0;border-radius:3px;overflow:hidden;margin-bottom:10px}
.key-progfill{height:100%;border-radius:3px}
.key-actions{display:flex;gap:6px;flex-wrap:wrap}
.new-key-form{background:var(--card);border:1px solid var(--borde);border-radius:var(--r10);padding:22px;margin-bottom:20px;box-shadow:var(--sombra)}
.new-key-form h3{font-family:'DM Serif Display',serif;font-size:16px;font-weight:400;margin-bottom:16px;color:var(--az)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.empty-state{text-align:center;padding:52px;color:var(--gris);font-size:13px;line-height:1.7;background:var(--card);border-radius:var(--r10);border:1px solid var(--borde)}

/* APP HEADER */
.app-header{background:var(--az);padding:15px 30px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;gap:12px}
.app-header h1{font-family:'DM Serif Display',serif;color:#fff;font-size:15px;font-weight:400;line-height:1.2}
.app-header p{color:rgba(255,255,255,.45);font-size:10px;margin-top:2px;text-transform:uppercase;letter-spacing:.04em}
.hdr-right{display:flex;align-items:center;gap:10px;flex-shrink:0}
.session-badge{background:rgba(255,255,255,.13);color:#fff;font-size:11px;padding:5px 11px;border-radius:20px;font-weight:500;line-height:1.2;text-align:right}
.session-badge span{display:block;font-size:9px;color:rgba(255,255,255,.45);font-weight:400;margin-top:1px}
.btn-logout{background:rgba(255,255,255,.1);color:rgba(255,255,255,.8);border:1px solid rgba(255,255,255,.18);padding:7px 13px;border-radius:var(--r6);font-family:'DM Sans',sans-serif;font-size:11px;cursor:pointer;transition:all .15s}
.btn-logout:hover{background:rgba(255,255,255,.18);color:#fff}
.saving-dot{width:7px;height:7px;border-radius:50%;background:var(--vd);opacity:0;transition:opacity .3s;flex-shrink:0}
.saving-dot.show{opacity:1}

/* BARRA GLOBAL */
.prog-wrap{background:var(--azm);padding:10px 30px;display:flex;align-items:center;gap:16px}
.prog-wrap span{color:rgba(255,255,255,.8);font-size:11px;white-space:nowrap;font-weight:500}
.prog-track{flex:1;height:6px;background:rgba(255,255,255,.15);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--cel),var(--vd));border-radius:3px;transition:width .4s}
.prog-pct{color:#fff;font-size:13px;font-weight:600;min-width:38px;text-align:right}

/* LAYOUT */
.app-layout{display:grid;grid-template-columns:220px 1fr;min-height:calc(100vh - 94px)}

/* SIDEBAR */
.sidebar{background:var(--card);border-right:1px solid var(--borde);padding:13px 0;position:sticky;top:94px;height:calc(100vh - 94px);overflow-y:auto}
.sidebar::-webkit-scrollbar{width:3px}
.sidebar::-webkit-scrollbar-thumb{background:var(--borde);border-radius:2px}
.sid-lbl{font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--gris);padding:0 15px 8px}
.sid-item{display:flex;align-items:center;gap:7px;padding:7px 15px;cursor:pointer;font-size:11px;color:var(--az);border-left:2px solid transparent;transition:all .15s}
.sid-item:hover{background:var(--sup)}
.sid-item.on{border-left-color:var(--cel);background:#eef4fb;color:var(--cel);font-weight:500}
.sid-item.done .sid-pill{background:#d1f2e4;color:var(--vd)}
.sid-pill{margin-left:auto;font-size:10px;font-weight:600;padding:2px 6px;border-radius:8px;background:var(--sup);color:var(--gris);flex-shrink:0}
.sid-item.on .sid-pill{background:#d0e8fa;color:var(--cel)}
.sid-prog{height:2px;background:var(--sup);margin:0 15px 2px 24px;border-radius:1px;overflow:hidden}
.sid-prog-fill{height:100%;border-radius:1px;transition:width .3s}

/* MAIN */
.main{padding:24px 30px;overflow-y:auto}
.nav-tabs{display:flex;gap:2px;margin-bottom:18px;border-bottom:1px solid #e8eef5}
.nav-tab{background:none;border:none;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;color:var(--gris);padding:8px 16px;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s}
.nav-tab:hover{color:var(--cel)}
.nav-tab.on{color:var(--cel);border-bottom-color:var(--cel)}

/* RESUMEN */
.stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:18px}
.stat{background:var(--card);border:1px solid var(--borde);border-radius:var(--r10);padding:14px;text-align:center;box-shadow:var(--sombra)}
.stat-n{font-size:28px;font-weight:500;line-height:1}
.stat-l{font-size:10px;color:var(--gris);margin-top:3px}
.res-card{background:var(--card);border:1px solid var(--borde);border-radius:var(--r10);overflow:hidden;box-shadow:var(--sombra)}
.res-table{width:100%;border-collapse:collapse;font-size:12px}
.res-table th{text-align:left;font-size:9px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--gris);padding:8px 12px;border-bottom:1px solid #eef2f7;background:var(--sup)}
.res-table td{padding:9px 12px;border-bottom:0.5px solid #eef2f7;vertical-align:middle}
.res-table tbody tr:hover td{background:#fafcff;cursor:pointer}
.bar-t{height:5px;background:var(--sup);border-radius:3px;overflow:hidden;width:80px}
.bar-fill{height:100%;border-radius:3px}
.chip{display:inline-block;padding:2px 9px;border-radius:10px;font-weight:700;font-size:11px}

/* GRÁFICOS */
.graf-global-card{background:var(--card);border:1px solid var(--borde);border-radius:var(--r10);padding:22px;margin-bottom:18px;display:flex;align-items:center;gap:28px;flex-wrap:wrap;box-shadow:var(--sombra)}
.donut-big{position:relative;width:130px;height:130px;flex-shrink:0}
.donut-big svg{position:absolute;top:0;left:0;display:block}
.donut-lbl{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none}
.d-pct{font-size:1.7rem;font-weight:500;line-height:1}
.d-sub{font-size:10px;color:var(--gris);margin-top:2px}
.leyenda-list{display:flex;flex-direction:column;gap:5px}
.leyenda-row{display:flex;align-items:center;gap:7px;font-size:11px}
.ley-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.graf-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(165px,1fr));gap:12px}
.graf-card{background:var(--card);border:1px solid var(--borde);border-radius:var(--r10);padding:16px 12px;display:flex;flex-direction:column;align-items:center;gap:9px;cursor:pointer;transition:transform .15s,border-color .15s,box-shadow .15s;box-shadow:var(--sombra)}
.graf-card:hover{transform:translateY(-2px);border-color:var(--cel);box-shadow:0 6px 20px rgba(26,46,74,0.12)}
.donut-sm{position:relative;width:90px;height:90px;flex-shrink:0}
.donut-sm svg{position:absolute;top:0;left:0;display:block}
.donut-sm-lbl{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none}
.dsm-pct{font-size:1.05rem;font-weight:500;line-height:1}
.dsm-n{font-size:10px;color:var(--gris);margin-top:1px}
.gcard-info{text-align:center;width:100%}
.gcard-titulo{font-size:11px;font-weight:500;color:var(--az);line-height:1.3;margin-bottom:3px}
.gcard-chips{display:flex;justify-content:center;gap:4px;margin-top:4px;flex-wrap:wrap}
.gchip{font-size:10px;padding:2px 7px;border-radius:8px;font-weight:600}

/* AREA CARD */
.area-card{background:var(--card);border:1px solid var(--borde);border-radius:var(--r10);margin-bottom:18px;overflow:hidden;box-shadow:var(--sombra)}
.area-hdr{padding:16px 22px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #eef2f7;background:var(--sup)}
.area-icon-wrap{display:flex;align-items:center;gap:11px}
.area-icon{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.area-tit{font-family:'DM Serif Display',serif;font-size:13px;font-weight:400;color:var(--az)}
.area-sub{font-size:10px;color:var(--gris);margin-top:2px}
.area-pct-big{font-size:22px;font-weight:500;text-align:right;line-height:1}
.area-cnt{font-size:10px;color:var(--gris);text-align:right;margin-top:1px}
.area-progbar{height:3px;background:#eef2f7}
.area-progfill{height:100%;transition:width .4s}

/* INDICADORES */
.ind-grupo{border-bottom:0.5px solid #eef2f7}
.ind-grupo:last-child{border-bottom:none}
.ind-item{display:flex;align-items:flex-start;gap:11px;padding:12px 22px;cursor:pointer;transition:background .12s;user-select:none}
.ind-item:hover{background:#fafcff}
.ind-item.ck{background:#f4fdf8}
.chkbox{width:17px;height:17px;border:1.5px solid var(--borde);border-radius:4px;flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;transition:all .15s;background:var(--card)}
.ind-item.ck .chkbox{background:var(--vd);border-color:var(--vd)}
.chkbox svg{display:none}
.ind-item.ck .chkbox svg{display:block}
.ind-txt{flex:1}
.ind-nombre{font-size:12px;font-weight:500;line-height:1.45;color:var(--az)}
.ind-item.ck .ind-nombre{color:#1a7a52}
.ind-ref{font-size:10px;color:var(--gris);margin-top:2px;font-style:italic}
.ind-vbar{display:flex;align-items:center;gap:7px;margin-top:5px}
.vmini{height:3px;width:65px;background:#e0e8f0;border-radius:2px;overflow:hidden}
.vmini-fill{height:100%;border-radius:2px;transition:width .3s}
.vsum-txt{font-size:10px;color:var(--gris)}
.btntgl{background:none;border:none;font-family:'DM Sans',sans-serif;font-size:10px;color:var(--cel);cursor:pointer;padding:0;display:flex;align-items:center;gap:3px;margin-left:auto}
.arr{display:inline-block;transition:transform .2s;font-style:normal}
.btntgl.open .arr{transform:rotate(90deg)}

/* PANEL VERIFICADORES */
.vp{display:none;background:#f8fbfe;border-top:0.5px solid #eaf0f8;padding:0 22px 10px 50px}
.vp.open{display:block}
.vp-hdr{font-size:9px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--gris);padding:9px 0 7px;border-bottom:0.5px solid #e4ecf4;margin-bottom:3px}
.vrow{padding:7px 0;border-bottom:0.5px dashed #e8f0f8}
.vrow:last-child{border-bottom:none}
.vrow-top{display:flex;align-items:flex-start;gap:8px}
.vchk{width:14px;height:14px;border:1.5px solid #b8ccd8;border-radius:3px;flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;background:var(--card)}
.vchk.on{background:var(--cel);border-color:var(--cel)}
.vchk svg{display:none}
.vchk.on svg{display:block}
.vright{flex:1}
.vlbl{font-size:11px;color:var(--az);line-height:1.35;cursor:pointer;transition:all .15s}
.vlbl.done{color:var(--cel);text-decoration:line-through;text-decoration-color:#a0c8e0}
.obs-btn{background:none;border:none;font-family:'DM Sans',sans-serif;font-size:10px;color:var(--gris);cursor:pointer;padding:2px 0 0;transition:color .15s;display:inline-flex;align-items:center;gap:3px}
.obs-btn:hover{color:var(--nr)}
.obs-btn.has{color:var(--nr);font-weight:500}
.obs-wrap{display:none;margin-top:5px}
.obs-wrap.open{display:block}
.obs-ta{width:100%;border:1px solid #c4d4e2;border-radius:5px;padding:7px 10px;font-family:'DM Sans',sans-serif;font-size:11px;color:var(--az);resize:vertical;min-height:50px;outline:none;background:#fffef7;transition:border .15s;line-height:1.4}
.obs-ta:focus{border-color:var(--nr);background:#fffcf0}
.obs-ta::placeholder{color:#aabccc}

/* SELECTOR ÁREA */
.area-sel{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.area-sel-btn{padding:4px 11px;border-radius:16px;border:1px solid;font-family:'DM Sans',sans-serif;font-size:11px;cursor:pointer;transition:all .15s}

/* MODAL INFORME */
.overlay{display:none;position:fixed;inset:0;background:rgba(10,20,40,.55);z-index:999;align-items:center;justify-content:center;padding:18px}
.overlay.open{display:flex}
.modal{background:var(--card);border-radius:14px;max-width:820px;width:100%;max-height:92vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(10,20,40,.3)}
.modal-hdr{background:var(--az);padding:18px 24px;display:flex;align-items:center;justify-content:space-between}
.modal-hdr h2{font-family:'DM Serif Display',serif;color:#fff;font-size:15px;font-weight:400}
.modal-fecha{color:rgba(255,255,255,.45);font-size:11px;margin-top:2px}
.btn-x{background:rgba(255,255,255,.1);border:none;color:#fff;width:30px;height:30px;border-radius:5px;font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s}
.btn-x:hover{background:rgba(255,255,255,.2)}
.modal-body{padding:22px 26px;overflow-y:auto;flex:1}
.modal-body::-webkit-scrollbar{width:4px}
.modal-body::-webkit-scrollbar-thumb{background:var(--borde);border-radius:2px}
.inf-top{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:18px}
.inf-stat{background:var(--sup);border-radius:8px;padding:12px;text-align:center}
.inf-stat .n{font-size:22px;font-weight:500;line-height:1}
.inf-stat .l{font-size:10px;color:var(--gris);margin-top:2px}
.inf-sec{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--gris);margin:16px 0 8px;padding-bottom:5px;border-bottom:1px solid #e8eef5}
.inf-bloque{margin-bottom:11px}
.inf-bloque-tit{font-weight:500;font-size:12px;color:var(--az);margin-bottom:4px;display:flex;align-items:center;gap:6px}
.inf-item{font-size:11px;padding:3px 0;color:var(--az);display:flex;align-items:flex-start;gap:7px;line-height:1.4}
.dot{width:6px;height:6px;border-radius:50%;margin-top:4px;flex-shrink:0}
.dot-v{background:var(--vd)}.dot-r{background:var(--rj)}.dot-o{background:var(--nr)}
.obs-line{background:#fffcf0;border-left:3px solid var(--nr);padding:4px 8px;margin:3px 0;border-radius:0 4px 4px 0;font-size:10px;color:#7a5000;font-style:italic}
.modal-ftr{padding:13px 24px;border-top:1px solid #e8eef5;display:flex;justify-content:flex-end;gap:8px;background:var(--sup)}
.btn-a{border:none;padding:9px 18px;border-radius:var(--r6);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;cursor:pointer;transition:background .2s}
.btn-a.az{background:var(--az);color:#fff}.btn-a.az:hover{background:var(--azm)}
.btn-a.vd{background:var(--vd);color:#fff}.btn-a.vd:hover{background:#1a8055}
.btn-a.pu{background:#9b59b6;color:#fff}.btn-a.pu:hover{background:#7d3c98}

@media(max-width:860px){
  .app-layout{grid-template-columns:1fr}
  .sidebar{position:static;height:auto}
  .stat-row,.inf-top{grid-template-columns:repeat(2,1fr)}
  .form-row{grid-template-columns:1fr}
}
</style>
</head>
<body>

<!-- Pantalla de carga -->

let session=null,eInd={},eVer={},eObs={},vista='resumen',areaActual=AREAS[0].id;
let saveTimer=null;

function colorPct(p){return p>=80?'#22a06b':p>=50?'#e8a020':'#d94040'}
function calcArea(a){const t=a.indicadores.length,ok=a.indicadores.filter((_,i)=>eInd[`${a.id}_${i}`]).length;return{t,ok,pct:t>0?Math.round(ok/t*100):0}}
function calcTotal(){let t=0,ok=0;AREAS.forEach(a=>{const s=calcArea(a);t+=s.t;ok+=s.ok});return{t,ok,pct:t>0?Math.round(ok/t*100):0}}
function countObs(){return Object.values(eObs).filter(v=>v&&v.trim()).length}
function initKeys(){
  AREAS.forEach(a=>a.indicadores.forEach((ind,i)=>{
    const k=`${a.id}_${i}`;
    if(eInd[k]===undefined)eInd[k]=false;
    ind.v.forEach((_,vi)=>{const vk=`${k}_v${vi}`;if(eVer[vk]===undefined)eVer[vk]=false;if(eObs[vk]===undefined)eObs[vk]='';});
  }));
}
function loading(show,txt=''){
  const s=document.getElementById('loading-screen');
  if(!s)return;
  s.classList.toggle('hidden',!show);
  const t=s.querySelector('.loading-txt');
  if(t&&txt)t.textContent=txt;
}

async function dbGetSessions(){
  const{data,error}=await sb.from('sesiones').select('*').order('nombre');
  if(error||!data)return{};
  const idx={};
  data.forEach(s=>{idx[s.clave]={nombre:s.nombre,est:s.establecimiento||'',creada:s.creada,activa:s.activa,pct:s.pct||0,lastSave:s.last_save};});
  return idx;
}
async function dbUpsertSession(clave,data){
  await sb.from('sesiones').upsert({clave,...data},{onConflict:'clave'});
}
async function dbDeleteSession(clave){
  await sb.from('sesiones').delete().eq('clave',clave);
}
async function dbToggleActiva(clave,activa){
  await sb.from('sesiones').update({activa}).eq('clave',clave);
}
async function dbLoadProgress(clave){
  const{data}=await sb.from('progresos').select('ind,ver,obs').eq('clave',clave).maybeSingle();
  if(data){eInd=data.ind||{};eVer=data.ver||{};eObs=data.obs||{};}
  else{eInd={};eVer={};eObs={};}
  initKeys();
}
async function dbSaveProgress(){
  if(!session||session.isAdmin)return;
  const pct=calcTotal().pct;
  const today=new Date().toLocaleDateString('es-CL');
  await sb.from('progresos').upsert({clave:session.key,ind:eInd,ver:eVer,obs:eObs,updated_at:new Date().toISOString()},{onConflict:'clave'});
  await sb.from('sesiones').update({pct,last_save:today}).eq('clave',session.key);
  const dot=document.getElementById('sv-dot');
  if(dot){dot.classList.add('show');setTimeout(()=>dot.classList.remove('show'),1200);}
}
async function dbGetAdminPass(){
  const{data}=await sb.from('config').select('value').eq('key','admin_password').maybeSingle();
  return data?.value||'ADMIN2024';
}
async function dbSetAdminPass(value){
  await sb.from('config').upsert({key:'admin_password',value},{onConflict:'key'});
}
function debouncedSave(){clearTimeout(saveTimer);saveTimer=setTimeout(dbSaveProgress,800);}

const NSV='http://www.w3.org/2000/svg';
function drawDonut(svg,pct,color,bg,cx,cy,r,sw){
  while(svg.firstChild)svg.removeChild(svg.firstChild);
  const bgC=document.createElementNS(NSV,'circle');
  bgC.setAttribute('cx',cx);bgC.setAttribute('cy',cy);bgC.setAttribute('r',r);
  bgC.setAttribute('fill','none');bgC.setAttribute('stroke',bg);bgC.setAttribute('stroke-width',sw);
  svg.appendChild(bgC);
  const p=Math.min(Math.max(pct,0),100);
  if(p===100){
    const f=document.createElementNS(NSV,'circle');
    f.setAttribute('cx',cx);f.setAttribute('cy',cy);f.setAttribute('r',r);
    f.setAttribute('fill','none');f.setAttribute('stroke',color);f.setAttribute('stroke-width',sw);
    svg.appendChild(f);
  }else if(p>0){
    const circ=2*Math.PI*r,filled=circ*p/100;
    const arc=document.createElementNS(NSV,'circle');
    arc.setAttribute('cx',cx);arc.setAttribute('cy',cy);arc.setAttribute('r',r);
    arc.setAttribute('fill','none');arc.setAttribute('stroke',color);arc.setAttribute('stroke-width',sw);
    arc.setAttribute('stroke-dasharray',`${filled} ${circ}`);
    arc.setAttribute('stroke-linecap','round');
    arc.setAttribute('transform',`rotate(-90 ${cx} ${cy})`);
    svg.appendChild(arc);
  }
}

        const vright=document.createElement('div');vright.className='vright';
        const vlbl=document.createElement('div');vlbl.className='vlbl'+(von?' done':'');vlbl.textContent=v;
        vlbl.addEventListener('click',e=>{e.stopPropagation();toggleVer(vk,key,area.id,ctx);});
        const safeId=`ow-${(vk+'-'+ctx).replace(/_/g,'-')}`;
        const obsBtn=document.createElement('button');
        obsBtn.className='obs-btn'+(obsV?' has':'');
        obsBtn.innerHTML=obsV?'✏️ Observación registrada':'＋ Agregar observación';

          e.stopPropagation();const w=document.getElementById(safeId);if(!w)return;
          w.classList.toggle('open');if(w.classList.contains('open'))w.querySelector('textarea')?.focus();
        });
        const obsW=document.createElement('div');obsW.className='obs-wrap';obsW.id=safeId;
        const ta=document.createElement('textarea');ta.className='obs-ta';
        ta.placeholder='Observación sobre este verificador…';ta.value=obsV;
        ta.addEventListener('click',e=>e.stopPropagation());
        ta.addEventListener('input',e=>{
          e.stopPropagation();eObs[vk]=ta.value;debouncedSave();
          obsBtn.className='obs-btn'+(ta.value.trim()?' has':'');
          obsBtn.innerHTML=ta.value.trim()?'✏️ Observación registrada':'＋ Agregar observación';
        });

        const rt=document.createElement('div');rt.className='vrow-top';rt.appendChild(vchk);rt.appendChild(vright);
        row.appendChild(rt);panel.appendChild(row);
      });
      grp.appendChild(panel);
    }
    body.appendChild(grp);
  });
  return div;
}
function tglPanel(e,pid,bid){

/* TOGGLE INDICADOR */
function toggleInd(key,areaId,ctx){
  eInd[key]=!eInd[key];
  document.querySelectorAll(`.ind-item[data-key="${key}"]`).forEach(el=>el.classList.toggle('ck',eInd[key]));
  updateAreaStats(areaId);updateGlobalProg();renderSidebar();updateGraficos();
  if(vista==='resumen')renderResumen(document.getElementById('vc'));
  debouncedSave();
}

/* TOGGLE VERIFICADOR */
function toggleVer(vk,indKey,areaId,ctx){
  eVer[vk]=!eVer[vk];
  const area=AREAS.find(a=>a.id===areaId);
  const parts=indKey.split('_'),idx=parseInt(parts[parts.length-1]);
  const ind=area?.indicadores[idx];
  if(ind&&ind.v.length>0){
    const todos=ind.v.every((_,vi)=>eVer[`${indKey}_v${vi}`]);
    if(todos!==eInd[indKey]){
      eInd[indKey]=todos;
      document.querySelectorAll(`.ind-item[data-key="${indKey}"]`).forEach(el=>el.classList.toggle('ck',todos));
    }
  }
  document.querySelectorAll(`.vchk[data-vk="${vk}"]`).forEach(el=>{
    el.classList.toggle('on',eVer[vk]);
    const lbl=el.nextElementSibling?.querySelector('.vlbl');
    if(lbl)lbl.className='vlbl'+(eVer[vk]?' done':'');
  });
  if(ind){
    const tV=ind.v.length,cumV=ind.v.filter((_,vi)=>eVer[`${indKey}_v${vi}`]).length;
    const pV=tV>0?Math.round(cumV/tV*100):0;
    document.querySelectorAll(`[id^="vmb-${indKey}-"]`).forEach(el=>{el.style.width=pV+'%';el.style.background=colorPct(pV);});
    document.querySelectorAll(`[id^="vsum-${indKey}-"]`).forEach(el=>el.textContent=`${cumV}/${tV} verificadores`);
  }
  updateAreaStats(areaId);updateGlobalProg();renderSidebar();updateGraficos();
  if(vista==='resumen')renderResumen(document.getElementById('vc'));
  debouncedSave();
}

function updateAreaStats(areaId){
  const area=AREAS.find(a=>a.id===areaId);if(!area)return;
  const s=calcArea(area),col=colorPct(s.pct);
  document.querySelectorAll(`[id^="apct-${areaId}-"]`).forEach(el=>{el.textContent=s.pct+'%';el.style.color=col;});
  document.querySelectorAll(`[id^="acnt-${areaId}-"]`).forEach(el=>el.textContent=`${s.ok} de ${s.t} indicadores`);
  document.querySelectorAll(`[id^="abar-${areaId}-"]`).forEach(el=>el.style.width=s.pct+'%');
}

function abrirInforme(){
  const s=calcTotal(),obs=countObs();
  const fecha=new Date().toLocaleDateString('es-CL',{year:'numeric',month:'long',day:'numeric'});
  document.getElementById('inf-fecha').textContent=`${session.nombre}${session.est?' — '+session.est:''} · ${fecha}`;
  let html=`<div class="inf-top">
    <div class="inf-stat"><div class="n" style="color:#22a06b">${s.ok}</div><div class="l">Indicadores cumplidos</div></div>

    <div class="inf-stat"><div class="n" style="color:#3b82c4">${s.pct}%</div><div class="l">Cumplimiento general</div></div>
    <div class="inf-stat"><div class="n" style="color:#e8700a">${obs}</div><div class="l">Observaciones registradas</div></div>
  </div>`;
  html+=`<div class="inf-sec">✅ Indicadores cumplidos (${s.ok})</div>`;
  let hasCump=false;
  AREAS.forEach(a=>{
    let blq='';
    a.indicadores.forEach((ind,i)=>{
      if(!eInd[`${a.id}_${i}`])return;hasCump=true;
      const key=`${a.id}_${i}`;
      const vOk=ind.v.filter((_,vi)=>eVer[`${key}_v${vi}`]);
      const vNo=ind.v.filter((_,vi)=>!eVer[`${key}_v${vi}`]);
      blq+=`<div class="inf-item"><div class="dot dot-v"></div><div><strong>${ind.t}</strong>`;
      if(vOk.length)blq+=`<br><span style="color:#22a06b;font-size:10px">✓ Presentes: ${vOk.join(' · ')}</span>`;
      if(vNo.length)blq+=`<br><span style="color:#d94040;font-size:10px">✗ Faltan: ${vNo.join(' · ')}</span>`;
      ind.v.forEach((v,vi)=>{const o=eObs[`${key}_v${vi}`];if(o&&o.trim())blq+=`<div class="obs-line">💬 <strong>${v}:</strong> ${o.trim()}</div>`;});
      blq+='</div></div>';
    });
    if(blq){const as=calcArea(a);html+=`<div class="inf-bloque"><div class="inf-bloque-tit">${a.icon} ${a.titulo} <span style="font-size:10px;color:var(--gris);font-weight:400">(${as.ok}/${as.t})</span></div><div>${blq}</div></div>`;}
  });
  if(!hasCump)html+=`<div style="color:var(--gris);padding:10px;background:var(--sup);border-radius:6px;font-size:12px">Sin indicadores cumplidos aún.</div>`;
  const pend=s.t-s.ok;
  html+=`<div class="inf-sec" style="margin-top:20px">❌ Indicadores pendientes (${pend})</div>`;
  if(!pend){
    html+=`<div style="color:#22a06b;padding:12px;background:#f5fdf9;border-radius:8px;font-size:12px">🎉 ¡Todos los indicadores están cumplidos!</div>`;
  } else {
    AREAS.forEach(a=>{
      let blq='';
      a.indicadores.forEach((ind,i)=>{
        if(eInd[`${a.id}_${i}`])return;
        const key=`${a.id}_${i}`;
        const vNo=ind.v.filter((_,vi)=>!eVer[`${key}_v${vi}`]);
        const vOk=ind.v.filter((_,vi)=>eVer[`${key}_v${vi}`]);
        blq+=`<div class="inf-item"><div class="dot dot-r"></div><div><strong>${ind.t}</strong>`;
        if(vNo.length)blq+=`<br><span style="color:#d94040;font-size:10px">✗ Faltantes: ${vNo.join(' · ')}</span>`;
        if(vOk.length)blq+=`<br><span style="color:#22a06b;font-size:10px">✓ Presentes: ${vOk.join(' · ')}</span>`;
        ind.v.forEach((v,vi)=>{const o=eObs[`${key}_v${vi}`];if(o&&o.trim())blq+=`<div class="obs-line">💬 <strong>${v}:</strong> ${o.trim()}</div>`;});
        blq+='</div></div>';
      });
      if(blq){const pN=a.indicadores.filter((_,i)=>!eInd[`${a.id}_${i}`]).length;html+=`<div class="inf-bloque"><div class="inf-bloque-tit">${a.icon} ${a.titulo} <span style="font-size:10px;color:#d94040;font-weight:400">(${pN} pendientes)</span></div><div>${blq}</div></div>`;}
    });
  }
  if(obs>0){
    html+=`<div class="inf-sec" style="margin-top:20px">💬 Observaciones consolidadas (${obs})</div>`;
    AREAS.forEach(a=>{
      let blq='';
      a.indicadores.forEach((ind,i)=>{
        const key=`${a.id}_${i}`;
        ind.v.forEach((v,vi)=>{const o=eObs[`${key}_v${vi}`];if(o&&o.trim())blq+=`<div class="inf-item"><div class="dot dot-o"></div><div><span style="font-size:10px;color:var(--gris)">${ind.t}</span><br><strong>${v}:</strong> <span style="color:#7a5000">${o.trim()}</span></div></div>`;});
      });
      if(blq)html+=`<div class="inf-bloque"><div class="inf-bloque-tit">${a.icon} ${a.titulo}</div><div>${blq}</div></div>`;
    });
  }
  document.getElementById('inf-body').innerHTML=html;
  document.getElementById('overlay').classList.add('open');
}
